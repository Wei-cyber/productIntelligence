version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Same env vars your ETL code reads via config.py — the DAG calls
    # run_extract()/run_load() in-process, so these need to be visible here too.
    PG_HOST: postgres
    PG_PORT: 5432
    PG_DB: ${PG_DB:-product_intel}
    PG_USER: ${PG_USER:-postgres}
    PG_PASSWORD: ${PG_PASSWORD:-postgres}
    SERPAPI_KEY: ${SERPAPI_KEY}
    AMAZON_DOMAIN: ${AMAZON_DOMAIN:-amazon.com}
    TRACKED_QUERIES: ${TRACKED_QUERIES:-Coffee}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: product_intel_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-product_intel}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./warehouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product_intel_dashboard
    restart: unless-stopped
    command: ["python", "dashboard/app.py"]
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB:-product_intel}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      SERPAPI_KEY: ${SERPAPI_KEY}
      TRACKED_QUERIES: ${TRACKED_QUERIES:-Coffee}
    ports:
      - "8050:8050"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Airflow's OWN metadata database. Separate from `postgres` above,
  # which is the product-intelligence warehouse. Keeping them apart means
  # Airflow's internal tables never mix with your bronze/silver/gold schema.
  airflow-postgres:
    image: postgres:16
    container_name: airflow_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Junwei \
          --lastname Quan \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  pg_data:
  airflow_pg_data:
  airflow_logs:

